<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Schoonmaak – Bestelplatform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f2f0;
    --surface: #ffffff;
    --surface2: #f7f9f7;
    --border: #e2e6e2;
    --accent: #1a6e3c;
    --accent-light: #e8f5ee;
    --accent2: #2d9e5f;
    --text: #1a1f1a;
    --text2: #4a584a;
    --text3: #7a8a7a;
    --danger: #c0392b;
    --badge: #fff3cd;
    --badge-text: #856404;
    --shadow: 0 2px 12px rgba(26,110,60,0.08);
    --shadow-lg: 0 8px 32px rgba(26,110,60,0.14);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--accent);
    color: white;
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(26,110,60,0.25);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 68px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .logo-icon {
    width: 38px; height: 38px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .logo-text { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-sub { font-size: 11px; opacity: 0.75; font-weight: 400; margin-top: 1px; }

  .header-search {
    flex: 1;
    min-width: 220px;
    position: relative;
    order: 3;
  }
  .header-search input {
    width: 100%;
    padding: 10px 16px 10px 40px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.15);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    z-index: 10;
  }
  .header-search input::placeholder { color: rgba(255,255,255,0.6); }
  .header-search input:focus { 
    border-color: rgba(255,255,255,0.8); 
    background: rgba(255,255,255,0.25);
    z-index: 50;
  }
  .search-icon {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    font-size: 15px; opacity: 0.7; pointer-events: none;
  }

  .cart-btn {
    position: relative;
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.25);
    color: white;
    border-radius: 10px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.2s;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .cart-btn:hover { background: rgba(255,255,255,0.25); }
  .cart-count {
    background: #f0c040;
    color: #1a1a00;
    border-radius: 20px;
    padding: 1px 6px;
    font-size: 11px;
    font-weight: 700;
    min-width: 20px;
    text-align: center;
  }

  /* MAIN */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px 20px 80px;
  }

  /* CATEGORIES */
  .categories {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .cat-btn {
    padding: 7px 14px;
    border-radius: 24px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .cat-btn:hover { border-color: var(--accent2); color: var(--accent); }
  .cat-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* GRID */
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text3);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  .product-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    cursor: default;
  }
  .product-card:hover {
    box-shadow: var(--shadow-lg);
    border-color: #c5d9c5;
    transform: translateY(-2px);
  }

  .product-image {
    width: 100%;
    height: 140px;
    background: var(--surface2);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .product-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .product-nr {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    background: var(--surface2);
    display: inline-block;
    padding: 2px 8px;
    border-radius: 5px;
    width: fit-content;
  }

  .product-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .product-use {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.4;
    flex: 1;
  }

  .product-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    flex-wrap: wrap;
  }
  .unit-badge {
    font-size: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    color: var(--text2);
    font-weight: 500;
  }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .qty-btn {
    width: 28px; height: 28px;
    border: none;
    background: var(--surface2);
    color: var(--accent);
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .qty-btn:hover { background: var(--accent-light); }
  .qty-display {
    width: 32px;
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    border: none;
    border-left: 1.5px solid var(--border);
    border-right: 1.5px solid var(--border);
    padding: 0;
    height: 28px;
    color: var(--text);
    background: white;
  }
  .qty-display:focus { outline: none; }

  .add-btn {
    width: 100%;
    padding: 9px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.18s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .add-btn:hover { background: var(--accent2); }
  .add-btn:active { transform: scale(0.98); }
  .add-btn.added { background: #2e7d32; }

  .product-card.hidden { display: none; }

  /* CART PANEL */
  .cart-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 200;
    display: none;
    opacity: 0;
    transition: opacity 0.25s;
  }
  .cart-overlay.open { display: block; opacity: 1; }

  .cart-panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 380px;
    max-width: 100vw;
    background: var(--surface);
    z-index: 201;
    box-shadow: -8px 0 40px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .cart-panel.open { transform: translateX(0); }

  .cart-header {
    padding: 20px 20px 14px;
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .cart-header h2 { font-size: 16px; font-weight: 700; }
  .close-cart {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    font-size: 18px;
    color: var(--text2);
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .close-cart:hover { background: var(--surface2); }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cart-empty {
    text-align: center;
    padding: 40px 0;
    color: var(--text3);
  }
  .cart-empty .empty-icon { font-size: 40px; margin-bottom: 10px; }
  .cart-empty p { font-size: 13px; }

  .cart-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 12px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
  }
  .cart-item-icon { font-size: 20px; flex-shrink: 0; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-size: 13px; font-weight: 600; }
  .cart-item-qty { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .cart-item-remove {
    background: none; border: none; cursor: pointer;
    color: var(--text3); font-size: 16px;
    transition: color 0.15s;
    flex-shrink: 0;
    padding: 0;
  }
  .cart-item-remove:hover { color: var(--danger); }

  .cart-footer {
    padding: 16px 20px;
    border-top: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .name-input-wrap label {
    font-size: 12px; font-weight: 600; color: var(--text2);
    display: block; margin-bottom: 4px;
  }
  .name-input-wrap input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: var(--surface);
    outline: none;
    transition: border-color 0.2s;
  }
  .name-input-wrap input:focus { border-color: var(--accent); }

  .submit-btn {
    width: 100%;
    padding: 12px;
    border-radius: 9px;
    border: none;
    background: var(--accent);
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.18s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .submit-btn:hover { background: var(--accent2); }
  .submit-btn:disabled { background: var(--border); color: var(--text3); cursor: not-allowed; }

  /* SUCCESS */
  .success-screen {
    display: none;
    position: fixed; inset: 0;
    background: white;
    z-index: 300;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 30px 20px;
    gap: 14px;
  }
  .success-screen.show { display: flex; }
  .success-icon { font-size: 60px; }
  .success-screen h2 { font-size: 22px; font-weight: 700; color: var(--accent); }
  .success-screen p { color: var(--text2); font-size: 14px; max-width: 300px; line-height: 1.5; }
  .success-back {
    margin-top: 6px;
    padding: 11px 24px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .success-back:hover { background: var(--accent2); }

  /* ORDER LOG */
  .orders-section {
    margin-top: 30px;
  }
  .orders-table-wrap {
    overflow-x: auto;
    background: var(--surface);
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow);
  }
  table { width: 100%; border-collapse: collapse; }
  th {
    background: var(--surface2);
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    letter-spacing: 0.4px;
    text-transform: uppercase;
    border-bottom: 1.5px solid var(--border);
  }
  td {
    padding: 11px 12px;
    font-size: 12px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .status-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 600;
    background: #d4edda;
    color: #155724;
  }
  .no-orders { text-align: center; padding: 24px; color: var(--text3); font-size: 13px; }

  @media (max-width: 768px) {
    .header-inner { 
      gap: 8px;
      height: auto;
      padding: 12px 0;
    }
    .logo-sub { display: none; }
    .logo-text { font-size: 16px; }
    .logo-icon { width: 32px; height: 32px; font-size: 18px; }
    .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
    .cart-panel { width: 100vw; }
    .cart-btn { font-size: 12px; padding: 8px 12px; }
    .header-search { min-width: 140px; }
    main { padding: 16px 12px 60px; }
  }

  @media (max-width: 480px) {
    .header-inner { flex-direction: column; align-items: stretch; }
    .logo { width: 100%; }
    .header-search { width: 100%; min-width: unset; order: 2; }
    .cart-btn { width: 100%; order: 3; justify-content: center; }
    .products-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .product-card { padding: 12px; }
    .product-image { height: 100px; }
    .product-name { font-size: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🧹</div>
      <div>
        <div class="logo-text">AK Schoonmaak</div>
        <div class="logo-sub">Bestelplatform</div>
      </div>
    </div>
    <div class="header-search">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Zoek product…" oninput="filterProducts()" autocomplete="off">
    </div>
    <button class="cart-btn" onclick="openCart()">
      🛒 <span class="cart-count" id="cartCount">0</span>
    </button>
  </div>
</header>

<main>
  <div class="categories" id="categories">
    <button class="cat-btn active" onclick="setCategory('all', this)">Alles</button>
    <button class="cat-btn" onclick="setCategory('reinigers', this)">Reinigers</button>
    <button class="cat-btn" onclick="setCategory('doeken', this)">Doeken</button>
    <button class="cat-btn" onclick="setCategory('mops', this)">Mops</button>
    <button class="cat-btn" onclick="setCategory('gereedschap', this)">Gereedschap</button>
    <button class="cat-btn" onclick="setCategory('veiligheid', this)">Veiligheid</button>
    <button class="cat-btn" onclick="setCategory('afval', this)">Afval</button>
    <button class="cat-btn" onclick="setCategory('stelen', this)">Stelen</button>
  </div>

  <div class="section-title" id="sectionTitle">Alle producten (37)</div>
  <div class="products-grid" id="productsGrid"></div>

  <div class="orders-section" id="ordersSection">
    <div class="section-title">Ingediende bestellingen</div>
    <div class="orders-table-wrap">
      <table id="ordersTable">
        <thead>
          <tr>
            <th>Tijdstip</th>
            <th>Medewerker</th>
            <th>Producten</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="ordersBody">
          <tr><td colspan="4" class="no-orders">Nog geen bestellingen</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Cart Overlay -->
<div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

<!-- Cart Panel -->
<div class="cart-panel" id="cartPanel">
  <div class="cart-header">
    <h2>🛒 Bestelling</h2>
    <button class="close-cart" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">
      <div class="empty-icon">🧹</div>
      <p>Voeg producten toe</p>
    </div>
  </div>
  <div class="cart-footer">
    <div class="name-input-wrap">
      <label for="employeeName">Uw naam</label>
      <input type="text" id="employeeName" placeholder="Jan de Vries">
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitOrder()" disabled>
      ✅ Plaatsen
    </button>
  </div>
</div>

<!-- Success screen -->
<div class="success-screen" id="successScreen">
  <div class="success-icon">✅</div>
  <h2>Bestelling ontvangen!</h2>
  <p id="successMsg">Uw bestelling is ingediend.</p>
  <button class="success-back" onclick="backToShop()">← Terug</button>
</div>

let cart = {};
let currentCategory = 'all';
let currentSearch = '';
let orders = JSON.parse(localStorage.getItem('ak_orders') || '[]');

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = '';
  let visible = 0;

  products.forEach(p => {
    const matchCat = currentCategory === 'all' || p.cat === currentCategory;
    const matchSearch = p.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                        p.use.toLowerCase().includes(currentSearch.toLowerCase());
    const show = matchCat && matchSearch;
    if (show) visible++;

    const qty = cart[p.id] || 0;
    const card = document.createElement('div');
    card.className = 'product-card' + (show ? '' : ' hidden');
    card.id = 'card-' + p.id;
    card.innerHTML = `
      <div class="product-image">
        <img src="${p.image}" alt="${p.name}" onerror="this.style.display='none'">
      </div>
      <div class="product-nr">Nr. ${p.id}</div>
      <div class="product-name">${p.name}</div>
      <div class="product-use">${p.use}</div>
      <div class="product-meta">
        <span class="unit-badge">${p.unit}</span>
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(${p.id}, -1)">−</button>
          <input class="qty-display" type="number" id="qty-${p.id}" value="${qty}" min="0" max="99" oninput="setQty(${p.id}, this.value)">
          <button class="qty-btn" onclick="changeQty(${p.id}, 1)">+</button>
        </div>
      </div>
      <button class="add-btn ${qty>0?'added':''}" id="addbtn-${p.id}" onclick="addToCart(${p.id})">
        ${qty>0 ? '✅ (' + qty + ')' : '+ Voeg toe'}
      </button>
    `;
    grid.appendChild(card);
  });

  document.getElementById('sectionTitle').textContent = 
    `${currentCategory === 'all' ? 'Alle producten' : currentCategory} (${visible})`;
}

function changeQty(id, delta) {
  const input = document.getElementById('qty-' + id);
  const newVal = Math.max(0, Math.min(99, (parseInt(input.value)||0) + delta));
  input.value = newVal;
  setQty(id, newVal);
}

function setQty(id, val) {
  const n = Math.max(0, Math.min(99, parseInt(val)||0));
  document.getElementById('qty-' + id).value = n;
  if (n > 0) {
    cart[id] = n;
  } else {
    delete cart[id];
  }
  updateAddBtn(id);
  updateCartCount();
}

function updateAddBtn(id) {
  const btn = document.getElementById('addbtn-' + id);
  const qty = cart[id] || 0;
  if (btn) {
    btn.textContent = qty > 0 ? `✅ (${qty})` : '+ Voeg toe';
    btn.className = 'add-btn' + (qty>0?' added':'');
  }
}

function addToCart(id) {
  const input = document.getElementById('qty-' + id);
  let n = parseInt(input.value) || 0;
  if (n === 0) { n = 1; input.value = 1; }
  cart[id] = n;
  updateAddBtn(id);
  updateCartCount();
}

function updateCartCount() {
  const total = Object.values(cart).reduce((s,v) => s+v, 0);
  document.getElementById('cartCount').textContent = total;
  document.getElementById('submitBtn').disabled = total === 0 || !document.getElementById('employeeName').value.trim();
}

function setCategory(cat, btn) {
  currentCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function filterProducts() {
  currentSearch = document.getElementById('searchInput').value;
  renderProducts();
}

function openCart() {
  renderCartPanel();
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartPanel').classList.add('open');
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartPanel').classList.remove('open');
}

function renderCartPanel() {
  const container = document.getElementById('cartItems');
  const ids = Object.keys(cart).filter(id => cart[id] > 0);
  if (ids.length === 0) {
    container.innerHTML = `<div class="cart-empty"><div class="empty-icon">🧹</div><p>Voeg producten toe</p></div>`;
  } else {
    container.innerHTML = ids.map(id => {
      const p = products.find(x => x.id == id);
      return `<div class="cart-item">
        <div class="cart-item-icon">${p.icon}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${p.name}</div>
          <div class="cart-item-qty">${cart[id]}× ${p.unit}</div>
        </div>
        <button class="cart-item-remove" onclick="removeFromCart(${id})">✕</button>
      </div>`;
    }).join('');
  }
  document.getElementById('employeeName').oninput = updateCartCount;
}

function removeFromCart(id) {
  delete cart[id];
  const inp = document.getElementById('qty-' + id);
  if (inp) inp.value = 0;
  updateAddBtn(id);
  updateCartCount();
  renderCartPanel();
}

function submitOrder() {
  const name = document.getElementById('employeeName').value.trim();
  if (!name) { alert('Vul uw naam in.'); return; }
  const ids = Object.keys(cart).filter(id => cart[id] > 0);
  if (ids.length === 0) return;

  const items = ids.map(id => {
    const p = products.find(x => x.id == id);
    return `${p.name} ×${cart[id]}`;
  }).join(', ');

  const order = {
    time: new Date().toLocaleString('nl-NL'),
    name,
    items,
    status: 'Ingediend'
  };
  orders.unshift(order);
  localStorage.setItem('ak_orders', JSON.stringify(orders.slice(0, 50)));

  document.getElementById('successMsg').textContent =
    `Beste ${name}, uw bestelling is ingediend.`;
  document.getElementById('successScreen').classList.add('show');
  closeCart();

  cart = {};
  products.forEach(p => {
    const inp = document.getElementById('qty-' + p.id);
    if (inp) inp.value = 0;
    updateAddBtn(p.id);
  });
  updateCartCount();
  renderOrders();
}

function backToShop() {
  document.getElementById('successScreen').classList.remove('show');
  renderProducts();
}

function renderOrders() {
  const tbody = document.getElementById('ordersBody');
  if (orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="no-orders">Nog geen bestellingen</td></tr>';
    return;
  }
  tbody.innerHTML = orders.slice(0, 10).map(o => `
    <tr>
      <td><span style="font-family:DM Mono,monospace;font-size:11px">${o.time}</span></td>
      <td><strong style="font-size:12px">${o.name}</strong></td>
      <td style="max-width:200px;white-space:normal;line-height:1.3;font-size:11px">${o.items}</td>
      <td><span class="status-badge">✅ ${o.status}</span></td>
    </tr>
  `).join('');
}

// Init
renderProducts();
renderOrders();
updateCartCount();
</script>
